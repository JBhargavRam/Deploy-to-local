
name: Update Alfresco Global Properties

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Target Deployment Environment'
        required: true
        default: 'Development'
        type: choice
        options:
          - Development
          - Staging
          - UAT

jobs:
  # 📋 Job 1: Maps your selected environment to a list of target runner labels
  setup-matrix:
    runs-on: windows-latest
    outputs:
      servers: ${{ steps.set-servers.outputs.servers }}
    steps:
      - id: set-servers
        shell: bash # Safe to run bash here as 'windows-latest' is a GitHub-hosted runner
        run: |
          if [ "${{ inputs.environment }}" = "Development" ]; then
             echo 'servers=["MyPC-1"]' >> $GITHUB_OUTPUT
          elif [ "${{ inputs.environment }}" = "Staging" ]; then
             echo 'servers=["IBM-PC"]' >> $GITHUB_OUTPUT
          elif [ "${{ inputs.environment }}" = "UAT" ]; then
             echo 'servers=["UAT-1", "UAT-2"]' >> $GITHUB_OUTPUT
          fi
   # runs-on: [self-hosted, "${{ inputs.environment == 'Development' && 'MyPC-1' || inputs.environment == 'Staging' && 'IBM-PC'  || inputs.environment == 'UAT' && 'UAT-1'}}"]

  update-file:
    needs: setup-matrix
    strategy:
      fail-fast: false 
      matrix:
        server: ${{ fromJson(needs.setup-matrix.outputs.servers) }}
        
    # 🚀 Targets each specific physical machine instance in parallel
    runs-on: [self-hosted, "${{ matrix.server }}"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          sparse-checkout-cone-mode: false # Fixes the "not a directory" error
          sparse-checkout: 'config/alfresco-global.properties'

       # 📁 Step 1: Dynamically determine and export the correct target path
      - name: Resolve Environment Configuration
        id: config
        shell: cmd
        run: |
          if "${{ inputs.environment }}"=="Development" (
             echo TARGET_PATH=D:\Work\JBR\Code\ACS Target\assumedTarget\>> %GITHUB_ENV%
             echo SCRIPT_PATH=D:\Work\JBR\Code\ACS Target\scripts\>> %GITHUB_ENV%
          )
          if "${{ inputs.environment }}"=="Staging" (
             echo TARGET_PATH=C:\Work\ACS\Target\>> %GITHUB_ENV%
             echo SCRIPT_PATH=C:\Work\ACS\Scripts\>> %GITHUB_ENV%
          )
          if "${{ inputs.environment }}"=="UAT" (
             echo TARGET_PATH=C:\Work\ACS\${{ matrix.server }}\>> %GITHUB_ENV%
             echo SCRIPT_PATH=C:\Work\ACS\Scripts\>> %GITHUB_ENV%
          )

      # 🔒 Step 3: Map and inject exactly two secrets
      - name: Inject Secrets into Properties File
        shell: cmd
        run: |
          :: 1. Pick the correct environment passwords and load them into local variables
          if "${{ inputs.environment }}"=="Development" (
              set "ENV_DB_PASS=${{ secrets.DEV_DB_PASSWORD }}"
              set "ENV_SHARED_SECRET=${{ secrets.DEV_SOLR_SHARED_SECRET }}"
          ) 
          if "${{ inputs.environment }}"=="Staging" (
              set "ENV_DB_PASS=${{ secrets.STAGING_DB_PASSWORD }}"
              set "ENV_SHARED_SECRET=${{ secrets.STAGING_SOLR_SHARED_SECRET }}"
          ) 
          if "${{ inputs.environment }}"=="UAT" (
              set "ENV_DB_PASS=${{ secrets.UAT_DB_PASSWORD }}"
              set "ENV_SHARED_SECRET=${{ secrets.UAT_SOLR_SHARED_SECRET }}"
          )
          
          :: 2. Replace the DB placeholder
          powershell -Command "(Get-Content 'config/alfresco-global.properties') -replace '__DB_PASSWORD_PLACEHOLDER__', '%ENV_DB_PASS%' | Set-Content 'config/alfresco-global.properties'"
          
          :: 3. Replace the Shared Secret placeholder
          powershell -Command "(Get-Content 'config/alfresco-global.properties') -replace '__SOLR_SHARED_SECRET__', '%ENV_SHARED_SECRET%' | Set-Content 'config/alfresco-global.properties'"

      - name: Copy File to Target Dir
        shell: cmd
        run: |
          echo Deploying to target path: "%TARGET_PATH%"
          
          if not exist "%TARGET_PATH%" mkdir "%TARGET_PATH%"
          
          if exist "config\alfresco-global.properties" (
              xcopy "config\alfresco-global.properties" "%TARGET_PATH%" /Y
          ) else (
              echo ERROR: Properties file not found in repo checkout! && exit 1
          )
      
     #   shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
     #   run: |
          # init
     #     $sourceFile = "config/alfresco-global.properties"
     #     $targetPath = "D:\Work\JBR\Code\ACS Target\assumedTarget\"

      #    Copy-Item -Path $sourceFile -Destination $targetPath -Force
       #   Write-Host "File Config Updated"

      - name: Run Success Message
        shell: cmd
        run: |
          echo Executing startup script from: "%SCRIPT_PATH%"
          cd /d "%SCRIPT_PATH%"
          call startup.bat
